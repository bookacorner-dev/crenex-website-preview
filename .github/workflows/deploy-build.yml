# ─────────────────────────────────────────────────────────────────────────────
# [CD] Publica el sitio estático a producción (crenex.io / Hostinger).
#   push/merge a main → espeja el sitio a la branch `build` (strippeando docs/,
#   .github/, .claude/, README) → Hostinger (Git deploy conectado a `build`)
#   publica a public_html por webhook.
# Sin build step: el repo ya es HTML/CSS/JS final. Runbook: docs/deploy-runbook.md
# ─────────────────────────────────────────────────────────────────────────────
name: "[CD] 🚀 Deploy · publish to build (Hostinger)"
run-name: "Deploy build · ${{ github.sha }} · @${{ github.actor }}"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-build
  cancel-in-progress: true

env:
  DEPLOY_BRANCH: build
  BUNDLE_DIR: _bundle

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Arma el bundle publicable (strip repo-only) y lo espeja a la branch `build`.
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Armar bundle desplegable (strip archivos repo-only)
        run: |
          mkdir -p "$BUNDLE_DIR"
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.claude' \
            --exclude 'docs' \
            --exclude 'README.md' \
            --exclude "$BUNDLE_DIR" \
            ./ "$BUNDLE_DIR"/
          echo "Contenido del bundle:"; find "$BUNDLE_DIR" -maxdepth 1 | sort

      - name: Publicar bundle → branch ${{ env.DEPLOY_BRANCH }}
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: ${{ env.DEPLOY_BRANCH }}
          FOLDER: ${{ env.BUNDLE_DIR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Deploy build: ({sha}) {msg}"
